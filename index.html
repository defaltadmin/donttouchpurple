    <!-- Loading Skeleton Styles (Issue #11: FCP/LCP) -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0d0820;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Skeleton loader shown before React hydrates */
      .skeleton-loader {
        text-align: center;
        color: #9d4edd;
      }
      .skeleton-loader h1 {
        margin: 0 0 20px 0;
        font-size: 32px;
        letter-spacing: 2px;
      }
      .spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(157, 78, 221, 0.3);
        border-top-color: #9d4edd;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BAMt8Opt.js"></script>
  </head>
  <body>
    <!-- Issue #8 & #11: Loading skeleton for FCP -->
    <div id="root">
      <div class="skeleton-loader">
        <h1>Don't Touch Purple</h1>
        <div class="spinner"></div>
      </div>
    </div>
