<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48">
  <defs>
    <filter id="glitch-grid-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="64" height="48" fill="#151028" rx="4"/>
  <g filter="url(#glitch-grid-glow)" stroke-width="0.5">
    <!-- Horizontal lines -->
    <line x1="0" y1="12" x2="64" y2="12" stroke="#fda9ff" opacity="0.4"/>
    <line x1="0" y1="24" x2="20" y2="24" stroke="#c026d3" opacity="0.8"/>
    <line x1="25" y1="26" x2="64" y2="26" stroke="#c026d3" opacity="0.8"/>
    <line x1="0" y1="36" x2="64" y2="36" stroke="#fda9ff" opacity="0.4"/>
    <!-- Vertical lines -->
    <line x1="16" y1="0" x2="16" y2="48" stroke="#fda9ff" opacity="0.4"/>
    <line x1="32" y1="0" x2="32" y2="15" stroke="#c026d3" opacity="0.8"/>
    <line x1="34" y1="20" x2="34" y2="48" stroke="#c026d3" opacity="0.8"/>
    <line x1="48" y1="0" x2="48" y2="48" stroke="#fda9ff" opacity="0.4"/>
  </g>
</svg>