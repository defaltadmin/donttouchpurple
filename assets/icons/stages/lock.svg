<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <filter id="glow-lock" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g fill="#9f8a9d">
    <!-- Grid background -->
    <rect x="4" y="4" width="3" height="3" opacity="0.3"/>
    <rect x="8" y="4" width="3" height="3" opacity="0.3"/>
    <rect x="12" y="4" width="3" height="3" opacity="0.3"/>
    <rect x="4" y="8" width="3" height="3" opacity="0.3"/>
    <rect x="8" y="8" width="3" height="3" opacity="0.3"/>
    <rect x="12" y="8" width="3" height="3" opacity="0.3"/>
    <!-- Lock -->
    <path d="M7 11V9a5 5 0 0 1 10 0v2" fill="none" stroke="#9f8a9d" stroke-width="2" stroke-linecap="round"/>
    <rect x="5" y="11" width="14" height="10" rx="2" filter="url(#glow-lock)"/>
    <circle cx="12" cy="16" r="1.5" fill="#151028"/>
  </g>
</svg>