name: Deploy Website to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'src/**'
      - 'engine/**'
      - 'components/**'
      - 'hooks/**'
      - 'utils/**'
      - 'config/**'
      - 'services/**'
      - 'workers/**'
      - 'styles/**'
      - 'assets/**'
      - 'locales/**'
      - 'vite.config.ts'
      - 'package.json'
      - '.github/workflows/website-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: pnpm install

      - name: Build game
        run: pnpm build

      - name: Copy game to website
        run: mkdir -p website/public/play && cp -r dist/* website/public/play/

      - name: Install website dependencies
        working-directory: website
        run: pnpm install

      - name: Build website
        working-directory: website
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/out --project-name=donttouchpurple
