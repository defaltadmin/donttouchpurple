<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Game Vault</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #201335 50%, #07050f 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #f3f1f6;
            --text-muted: #a49eb5;
            --accent: #bb86fc;
            --accent-glow: rgba(187, 134, 252, 0.4);
            --card-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        input, select, button {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        button.primary-btn {
            background: var(--accent);
            color: #07050f;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        button.primary-btn:hover {
            box-shadow: 0 0 15px var(--accent);
            transform: translateY(-1px);
        }

        .library-stats {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1.5rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: var(--glass-highlight);
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.25rem;
        }

        .game-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .card-actions {
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .rating-container {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .star {
            font-size: 1.25rem;
            cursor: pointer;
            color: var(--glass-border);
            transition: color 0.1s ease;
        }

        .star.active {
            color: #ffd700;
        }

        .status-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            font-size: 0.8rem;
            padding: 0.5rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #161126;
            border: 1px solid var(--accent);
            border-radius: var(--card-radius);
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Personal Game Vault</h1>
        <div class="library-stats">
            <span id="total-count">Total Titles: 0</span>
            <span id="installed-count">Installed: 0</span>
        </div>
    </header>

    <div class="controls-panel">
        <div class="control-group">
            <label for="search-input">Search Library</label>
            <input type="text" id="search-input" placeholder="Type title name...">
        </div>
        <div class="control-group">
            <label for="filter-source">Platform</label>
            <select id="filter-source">
                <option value="all">All Platforms</option>
            </select>
        </div>
        <div class="control-group">
            <label for="filter-status">My Rating/Status</label>
            <select id="filter-status">
                <option value="all">All Statuses</option>
                <option value="Unassigned">Unassigned</option>
                <option value="Backlog">Backlog</option>
                <option value="Playing">Playing</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
        <div class="control-group">
            <label for="sort-by">Sort By</label>
            <select id="sort-by">
                <option value="Name">Title Name</option>
                <option value="Playtime">Playtime (High to Low)</option>
                <option value="Rating">My Rating (High to Low)</option>
            </select>
        </div>
        <div class="control-group">
            <button class="primary-btn" id="random-pick-btn">Casual Picker</button>
        </div>
    </div>

    <div class="control-group" style="margin-bottom: 2rem; max-width: 350px;">
        <label for="json-upload">Import Library JSON</label>
        <input type="file" id="json-upload" accept=".json">
    </div>

    <main class="games-grid" id="games-container">
        </main>
</div>

<div class="modal" id="picker-modal">
    <div class="modal-content">
        <label>System Selection</label>
        <div class="modal-title" id="picked-game-title">Game Title</div>
        <div id="picked-game-details" style="margin-bottom: 1.5rem; color: var(--text-muted);">Details</div>
        <button class="primary-btn" id="close-modal-btn">Acknowledge</button>
    </div>
</div>

<script>
    let gamesData = [];
    let customMetadata = JSON.parse(localStorage.getItem('game_vault_metadata')) || {};

    const jsonUpload = document.getElementById('json-upload');
    const gamesContainer = document.getElementById('games-container');
    const searchInput = document.getElementById('search-input');
    const filterSource = document.getElementById('filter-source');
    const filterStatus = document.getElementById('filter-status');
    const sortBy = document.getElementById('sort-by');
    const randomPickBtn = document.getElementById('random-pick-btn');
    const pickerModal = document.getElementById('picker-modal');
    const pickedGameTitle = document.getElementById('picked-game-title');
    const pickedGameDetails = document.getElementById('picked-game-details');
    const closeModalBtn = document.getElementById('close-modal-btn');

    jsonUpload.addEventListener('change', handleFileImport);
    searchInput.addEventListener('input', updateUI);
    filterSource.addEventListener('change', updateUI);
    filterStatus.addEventListener('change', updateUI);
    sortBy.addEventListener('change', updateUI);
    randomPickBtn.addEventListener('click', selectRandomGame);
    closeModalBtn.addEventListener('click', () => pickerModal.style.display = 'none');

    function handleFileImport(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const parsed = JSON.parse(evt.target.result);
                gamesData = Array.isArray(parsed) ? parsed : [];
                populateFilterOptions();
                updateUI();
            } catch (err) {
                alert('Invalid JSON structure detected.');
            }
        };
        reader.readAsText(file);
    }

    function populateFilterOptions() {
        const sources = new Set(gamesData.map(g => g.Source).filter(Boolean));
        filterSource.innerHTML = '<option value="all">All Platforms</option>';
        sources.forEach(src => {
            const opt = document.createElement('option');
            opt.value = src;
            opt.textContent = src;
            filterSource.appendChild(opt);
        });
    }

    function saveMetadata(gameName, key, value) {
        if (!customMetadata[gameName]) customMetadata[gameName] = { rating: 0, status: 'Unassigned' };
        customMetadata[gameName][key] = value;
        localStorage.setItem('game_vault_metadata', JSON.stringify(customMetadata));
    }

    function getFilteredGames() {
        const query = searchInput.value.toLowerCase();
        const srcFilter = filterSource.value;
        const statusFilter = filterStatus.value;
        const sortType = sortBy.value;

        return gamesData.filter(game => {
            const matchesSearch = game.Name.toLowerCase().includes(query);
            const matchesSource = srcFilter === 'all' || game.Source === srcFilter;
            
            const meta = customMetadata[game.Name] || { rating: 0, status: 'Unassigned' };
            const matchesStatus = statusFilter === 'all' || meta.status === statusFilter;

            return matchesSearch && matchesSource && matchesStatus;
        }).sort((a, b) => {
            if (sortType === 'Name') return a.Name.localeCompare(b.Name);
            if (sortType === 'Playtime') return (b.Playtime || 0) - (a.Playtime || 0);
            if (sortType === 'Rating') {
                const rA = customMetadata[a.Name]?.rating || 0;
                const rB = customMetadata[b.Name]?.rating || 0;
                return rB - rA;
            }
            return 0;
        });
    }

    function updateUI() {
        const filtered = getFilteredGames();
        document.getElementById('total-count').textContent = `Total Titles: ${gamesData.length}`;
        document.getElementById('installed-count').textContent = `Installed: ${gamesData.filter(g => g.IsInstalled).length}`;

        gamesContainer.innerHTML = '';
        filtered.forEach(game => {
            const meta = customMetadata[game.Name] || { rating: 0, status: 'Unassigned' };
            const card = document.createElement('div');
            card.className = 'game-card';
            
            const hours = game.Playtime ? Math.round(game.Playtime / 3600) : 0;

            card.innerHTML = `
                <div>
                    <div class="game-title">${game.Name}</div>
                    <div class="game-meta">
                        <span>Platform: ${game.Source || 'Unknown'}</span>
                        <span>Logged Playtime: ${hours} Hours</span>
                        <span>Status: ${game.IsInstalled ? 'Installed' : 'Uninstalled'}</span>
                    </div>
                </div>
                <div class="card-actions">
                    <div class="rating-container">
                        ${[1,2,3,4,5].map(num => `
                            <span class="star ${num <= meta.rating ? 'active' : ''}" data-value="${num}">★</span>
                        `).join('')}
                    </div>
                    <select class="status-select">
                        <option value="Unassigned" ${meta.status === 'Unassigned' ? 'selected' : ''}>Unassigned</option>
                        <option value="Backlog" ${meta.status === 'Backlog' ? 'selected' : ''}>Backlog</option>
                        <option value="Playing" ${meta.status === 'Playing' ? 'selected' : ''}>Playing</option>
                        <option value="Completed" ${meta.status === 'Completed' ? 'selected' : ''}>Completed</option>
                    </select>
                </div>
            `;

            const stars = card.querySelectorAll('.star');
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const val = parseInt(star.getAttribute('data-value'));
                    saveMetadata(game.Name, 'rating', val);
                    updateUI();
                });
            });

            const select = card.querySelector('.status-select');
            select.addEventListener('change', (e) => {
                saveMetadata(game.Name, 'status', e.target.value);
                updateUI();
            });

            gamesContainer.appendChild(card);
        });
    }

    function selectRandomGame() {
        const eligiblePool = getFilteredGames();
        if (eligiblePool.length === 0) {
            alert('No games found matching current filters.');
            return;
        }
        const selection = eligiblePool[Math.floor(Math.random() * eligiblePool.length)];
        const hours = selection.Playtime ? Math.round(selection.Playtime / 3600) : 0;
        
        pickedGameTitle.textContent = selection.Name;
        pickedGameDetails.textContent = `Platform: ${selection.Source || 'N/A'} | Logged Playtime: ${hours} hours`;
        pickerModal.style.display = 'flex';
    }
</script>
</body>
</html>
